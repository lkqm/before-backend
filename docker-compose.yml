services:
  mysql:
    image: mysql:8.0
    container_name: before-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: before
      MYSQL_USER: before
      MYSQL_PASSWORD: before_dev_password
      MYSQL_ROOT_PASSWORD: before_root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ubefore -pbefore_dev_password"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
