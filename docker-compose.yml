services:
  postgres:
    image: postgres:16-alpine
    container_name: before-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: before_backend
      POSTGRES_USER: before
      POSTGRES_PASSWORD: before_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U before -d before_backend"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
