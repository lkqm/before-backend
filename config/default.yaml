app:
  port: 3000
  swaggerEnabled: true

database:
  url: ""

wechat:
  appId: "wx112134d4c8916866"
  appSecret: ""
  tlsRejectUnauthorized: false
  requestTimeoutMs: 8000

auth:
  tokenSecret: ""
  tokenTtlMs: 2592000000

quota:
  signupAiCredits: 10

ai:
  providers:
    doubao:
      type: openai-compatible
      baseUrl: https://ark.cn-beijing.volces.com/api/v3
      apiKey: ""
      timeoutMs: 15000
      imageTimeoutMs: 30000
      maxRetries: 0

      models:
        seed-mini-260215:
          id: doubao-seed-2-0-mini-260215
          capabilities: [text]
          weight: 100
          supportsJsonMode: true
          supportsThinking: true

        seed-lite-260215:
          id: doubao-seed-2-0-lite-260215
          capabilities: [image]
          weight: 100
          supportsJsonMode: true
          supportsThinking: true

        seed-mini-260428:
          id: doubao-seed-2-0-mini-260428
          capabilities: [text]
          weight: 20
          supportsJsonMode: false
          supportsThinking: true
          enabled: false

  strategy: weighted-random

  tasks:
    rewrite:
      mode: text
      maxTokens: 120
      temperature: 0.7
      systemPrompt: |-
        你是一个朋友圈文案编辑，负责把用户输入改写成自然、真实、克制的中文朋友圈文案。

        改写原则：
        - 保留原文事实，不编造地点、人物、事件、情绪或结果
        - 像普通人真实发朋友圈，不要像广告、营销文、小红书种草文或作文
        - 语言口语化，少用成语、排比、感叹号和夸张修辞
        - 不要使用“治愈”“氛围感”“松弛感”“生活的美好”“人间值得”等模板化表达
        - 每条尽量短，优先一到两句话
        - 不要解释，不要寒暄，不要输出标题

        三种风格：
        - natural：自然顺口，适合大多数场景
        - daily：更生活化，像随手记录
        - minimal：更短更克制，少形容词
      thinking: false
      jsonMode: true

    textCaption:
      mode: text
      maxTokens: 240
      temperature: 0.7
      systemPrompt: |-
        你是一个朋友圈文案编辑，根据用户给的场景生成自然、真实、克制的中文朋友圈文案。

        生成原则：
        - 贴合用户给出的场景，不编造未提供的地点、人物、事件或情绪
        - 像普通人真实发朋友圈，不要像广告、营销文、小红书种草文或作文
        - 语言口语化，少用成语、排比、感叹号和夸张修辞
        - 不要使用“治愈”“氛围感”“松弛感”“生活的美好”“人间值得”等模板化表达
        - 每条尽量短，优先一到两句话
        - 不要解释，不要寒暄，不要输出标题

        三种风格：
        - natural：自然顺口，适合大多数场景
        - daily：更生活化，像随手记录
        - minimal：更短更克制，少形容词
      thinking: false
      jsonMode: true

    imageCaption:
      mode: image
      maxImages: 4
      maxTokens: 220
      temperature: 0.7
      systemPrompt: |-
        你是一个朋友圈文案助手，根据图片、场景、地点、时间和用户补充生成自然、真实的中文朋友圈文案。

        生成原则：
        - 优先贴合图片里能明确看到的内容和用户补充信息
        - 不编造图片中看不出的地点、人物关系、事件、品牌或情绪
        - 像普通人真实发朋友圈，不要像广告、小红书标题或作文
        - 语言口语化，少用成语、排比、感叹号和夸张修辞
        - 可以少量使用 emoji，但不要堆砌
        - 不要输出 hashtag、标题、解释或寒暄

        三种风格：
        - natural：自然顺口，适合大多数场景
        - minimal：更短更克制，少形容词
        - cute：轻松可爱，但不要过度卖萌
      thinking: false
      jsonMode: true

    imageRank:
      mode: image
      maxImages: 9
      temperature: 0.3
      systemPrompt: |-
        你是朋友圈图片排序助手。目标是让这组图片发朋友圈时第一眼更舒服。

        排序原则：
        - 首图优先选择主体清晰、构图完整、情绪明确、第一眼有吸引力的图片
        - 发布顺序要兼顾色彩连续性、内容节奏和场景变化
        - 避免把高度重复、模糊、遮挡严重或信息弱的图片放在前面
        - 理由要非常短，只说明最关键的判断
        - 不要建议删除图片
      thinking: true
      jsonMode: true
